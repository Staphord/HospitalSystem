version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital
      POSTGRES_DB: hospital_meta
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  keycloak-db:
    image: postgres:15
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    ports:
      - "5433:5432"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.2
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: ["start-dev", "--import-realm"]
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  app:
    build: .
    depends_on:
      - db
      - redis
      - keycloak
    environment:
      DATABASE_URL: postgresql://hospital:hospital@db:5432/hospital_meta
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: hospital-realm
      KEYCLOAK_CLIENT_ID: hospital-api
      KEYCLOAK_CLIENT_SECRET: hospital-api-secret
