version: "3.8"

networks:
  hospital-network-test:
    driver: bridge

services:
  postgres-master-test:
    image: postgres:16-alpine
    container_name: hospital-postgres-master-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital_master_test
    ports:
      - "15432:5432"
    networks:
      - hospital-network-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital_master_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: hospital-redis-test
    ports:
      - "16379:6379"
    networks:
      - hospital-network-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq-test:
    image: rabbitmq:3.13-management-alpine
    container_name: hospital-rabbitmq-test
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"
      - "25672:25672"
    networks:
      - hospital-network-test
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: ghcr.io/your-org/api-gateway:latest
    container_name: hospital-api-gateway-test
    ports:
      - "18000:8000"
    environment:
      - MASTER_DB_URL=postgresql://postgres:postgres@postgres-master-test:5432/hospital_master_test
      - REDIS_URL=redis://redis-test:6379/0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq-test:5672/
    networks:
      - hospital-network-test
    depends_on:
      postgres-master-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      rabbitmq-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  auth-service:
    image: ghcr.io/your-org/auth-service:latest
    container_name: hospital-auth-service-test
    ports:
      - "18001:8001"
    environment:
