networks:
  hospital-network:
    driver: bridge

services:
  postgres-master:
    image: postgres:16-alpine
    container_name: hospital-postgres-master
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nasr
      POSTGRES_DB: hospital_master
    ports:
      - "5432:5432"
    volumes:
      - postgres-master-data:/var/lib/postgresql/data
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hospital-redis
    ports:
      - "6380:6379"
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: hospital-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: hospital-flow-cookie
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: hospital-api-gateway
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      MASTER_DB_URL: postgresql://postgres:nasr@postgres-master:5432/hospital_master
      SECRET_KEY: 6477db2372e99bef59ff6d4fa4edef3f3891daee3807153d4ea09448bec2f6c6
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_URL: http://host.docker.internal:8080
      KEYCLOAK_REALM: hospital-realm
      KEYCLOAK_CLIENT_ID: hospital-api
      KEYCLOAK_CLIENT_SECRET: Wl55s8b84G7FnO7cOlW0T6hXhs3aMGdZ
      KEYCLOAK_INTROSPECT: "false"
      ALLOWED_ORIGINS: http://localhost:8000,http://localhost:8501
      TENANT_DB_ENCRYPTION_KEY: RZ4x5srAJWSrMAAkllCfVuqYiHYIIlfgXDdvAN11Gh0=
      AUTH_SERVICE_URL: http://auth-service:8001
      MASTER_SERVICE_URL: http://master-service:8002
      RECEPTION_SERVICE_URL: http://reception-service:8010
      TRIAGE_SERVICE_URL: http://triage-service:8011
      CONSULTATION_SERVICE_URL: http://consultation-service:8012
      LABORATORY_SERVICE_URL: http://laboratory-service:8013
      RADIOLOGY_SERVICE_URL: http://radiology-service:8014
      PHARMACY_SERVICE_URL: http://pharmacy-service:8015
      BILLING_SERVICE_URL: http://billing-service:8016
      WARD_SERVICE_URL: http://ward-service:8017
      ADMIN_SERVICE_URL: http://admin-service:8018
      PATIENT_SERVICE_URL: http://patient-service:8005
      VISIT_SERVICE_URL: http://visit-service:8006
      NOTIFICATION_SERVICE_URL: http://notification-service:8019
      REPORT_SERVICE_URL: http://report-service:8020
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres-master:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../shared:/app/shared:ro
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  auth-service:
